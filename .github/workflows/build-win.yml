name: Build Windows .exe using pyinstaller

on: push

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r src/requirements.txt
        pip install -r build/requirements.txt

    - name: Build executable
      run: |
        cd build
        pyinstaller build/chirplab.spec

    - uses: actions/upload-artifact@v4
      with:
        name: chirplab-win
        path: build/dist/chirplab


        
    - name: Zip for release
      if: startsWith(github.ref, 'refs/tags/')
      run: cd build/dist/chirplab; zip -r chirplab_${{  github.ref_name }}_win.zip *; cd ../../../

    - name: Add bundle to release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: build/dist/windows/chirplab_${{  github.ref_name }}_win.zip



